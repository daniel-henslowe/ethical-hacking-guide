<!-- JetBrains Mono — matching Ghostty terminal font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* Apply Inter for body text, JetBrains Mono for code */
  :root {
    --ctp-base: #303446;
    --ctp-crust: #232634;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  }

  code, pre, .highlight, kbd, samp, tt {
    font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Fira Code', 'SF Mono', monospace;
  }

  /* Smooth color-scheme for browser chrome */
  :root {
    color-scheme: dark;
  }

  /* Theme color for mobile browsers */
  meta[name="theme-color"] {
    content: #303446;
  }
</style>

<meta name="theme-color" content="#303446">
